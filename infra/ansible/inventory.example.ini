# Copier en `inventory.ini`. Cas par défaut : on exécute le playbook DIRECTEMENT
# sur la VM (pas de control node distant) → connexion locale.
[planit_vm]
localhost ansible_connection=local

# Variante control node distant (depuis ton PC/WSL) — décommenter et adapter :
# [planit_vm]
# planit ansible_host=192.168.1.50 ansible_user=deploy

# ── PROD réelle (box Hetzner, planit.sn) — V04 LOT 8 / ADR-0017 ───────────────
# Control node distant vers la box cloud. Le MÊME playbook (site.yml) provisionne
# Docker + durcissement OS + agent CD. La différence prod ↔ staging est dans
# /opt/planit/cd.env (IMAGE_TAG=main) et /opt/planit/.env.prod (PLANIT_DOMAIN=planit.sn,
# CADDY_TLS=admin@planit.sn) — pas dans le playbook. Renseigner l'IP réelle hors repo.
# [planit_prod]
# planit-prod ansible_host=<IP_HETZNER> ansible_user=deploy
