---
# V04 LOT 5.7 — Provisioning + durcissement OS de la VM self-host (ADR-0013, V4-D14/D16).
#
# Exécution recommandée DIRECTEMENT SUR LA VM (pas besoin de control node) :
#   sudo apt-get update && sudo apt-get install -y ansible git
#   git clone <repo> /opt/planit/src && cd /opt/planit/src/infra/ansible
#   sudo ansible-playbook -i inventory.ini site.yml --connection=local
#
# Idempotent : ré-exécutable sans effet de bord. Vérif à blanc : ajouter --check.

- name: Provision PLANIT self-host VM (Ubuntu 24.04)
  hosts: planit_vm
  become: true

  vars:
    deploy_user: deploy
    app_dir: /opt/planit
    # SSH par clé : passe à true UNIQUEMENT après avoir confirmé que ta clé
    # publique fonctionne (sinon lockout). Laisse false au 1er run.
    harden_ssh_disable_password: false

  tasks:
    # ── Paquets de base + sécurité ──────────────────────────────
    - name: Install base + security packages
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - git
          - ufw
          - fail2ban
          - unattended-upgrades
          - age            # chiffrement des sauvegardes au repos (backup.sh)
          - nfs-common     # mount off-box TrueNAS (truenas-backup.md)
          - rsync          # copie off-box incrémentale (backup.sh)
        state: present
        update_cache: true

    # ── Docker CE (dépôt officiel) ──────────────────────────────
    - name: Add Docker APT keyring
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'

    - name: Add Docker APT repository
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc]
          https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable
        filename: docker
        state: present

    - name: Install Docker Engine + compose plugin
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Enable & start Docker
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

    # ── Utilisateur de déploiement ──────────────────────────────
    - name: Create deploy user (in docker group)
      ansible.builtin.user:
        name: "{{ deploy_user }}"
        groups: docker
        shell: /bin/bash
        create_home: true

    - name: Create app directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: '0750'
      loop:
        - "{{ app_dir }}"
        - "{{ app_dir }}/backups"

    # ── Pare-feu (ufw) ──────────────────────────────────────────
    # Local/LAN : on autorise SSH + HTTP/HTTPS (Caddy). Pas d'exposition Internet
    # ici, mais le filet reste posé (V4-D16).
    - name: UFW allow OpenSSH/HTTP/HTTPS
      community.general.ufw:
        rule: allow
        name: "{{ item }}"
      loop: [OpenSSH]
    - name: UFW allow web ports
      community.general.ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop: ['80', '443']
    - name: Enable UFW (default deny incoming)
      community.general.ufw:
        state: enabled
        policy: deny
        direction: incoming

    # ── fail2ban + MAJ auto ─────────────────────────────────────
    - name: Enable fail2ban
      ansible.builtin.systemd:
        name: fail2ban
        enabled: true
        state: started

    - name: Enable unattended-upgrades
      ansible.builtin.copy:
        dest: /etc/apt/apt.conf.d/20auto-upgrades
        content: |
          APT::Periodic::Update-Package-Lists "1";
          APT::Periodic::Unattended-Upgrade "1";
        mode: '0644'

    # ── Durcissement SSH (opt-in) ───────────────────────────────
    - name: Disable SSH password auth (opt-in)
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication no'
        validate: '/usr/sbin/sshd -t -f %s'
      when: harden_ssh_disable_password
      notify: Restart sshd

    # ── Agent CD pull-based (systemd timer) ─────────────────────
    - name: Install CD pull script
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../prod/scripts/cd-pull.sh"
        dest: "{{ app_dir }}/cd-pull.sh"
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: '0750'

    - name: Install CD systemd unit + timer
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../prod/scripts/{{ item }}"
        dest: "/etc/systemd/system/{{ item }}"
        mode: '0644'
      loop:
        - planit-cd.service
        - planit-cd.timer

    - name: Enable CD timer
      ansible.builtin.systemd:
        name: planit-cd.timer
        enabled: true
        state: started
        daemon_reload: true

    # ── Sauvegarde planifiée (cron 02h) ─────────────────────────
    # V4-D11c : backups planifiés. Le chiffrement (age), l'off-box (NFS) et
    # l'alerte (push) sont pilotés par les variables PLANIT_BACKUP_* de cd.env
    # (cf. docs/runbooks/truenas-backup.md). Le script est idempotent côté cron.
    - name: Schedule nightly Postgres backup (02:00)
      ansible.builtin.cron:
        name: planit-backup
        user: "{{ deploy_user }}"
        minute: '0'
        hour: '2'
        job: "{{ app_dir }}/src/infra/prod/scripts/backup.sh >> {{ app_dir }}/backup.log 2>&1"

    # ── Hygiène disque (VM à petit disque ~16 Go) ───────────────
    # Incident 2026-06-09 : `/` à 98 % → Grafana KO. Deux causes structurelles
    # de croissance non bornée, qu'on plafonne ici (le reste = limites compose).

    # 1. Images Docker : le CD tire de nouvelles images :staging à chaque
    #    déploiement et conserve les précédentes (rollback) → accumulation.
    #    Purge hebdo de ce qui est INUTILISÉ depuis > 7 jours : `until=168h`
    #    préserve les images récentes (dont la cible de rollback du dernier
    #    deploy), ne supprime que le vieux. `deploy` est dans le groupe docker.
    - name: Schedule weekly Docker image prune (dim. 03:30)
      ansible.builtin.cron:
        name: planit-docker-prune
        user: "{{ deploy_user }}"
        weekday: '0'
        minute: '30'
        hour: '3'
        job: "docker image prune -af --filter until=168h >> {{ app_dir }}/docker-prune.log 2>&1"

    # 2. Journal systemd : sans borne, /var/log/journal croît sans limite
    #    (vacuum manuel observé pendant l'incident). On le plafonne.
    - name: Ensure journald drop-in directory exists
      ansible.builtin.file:
        path: /etc/systemd/journald.conf.d
        state: directory
        mode: '0755'

    - name: Cap systemd journal size
      ansible.builtin.copy:
        dest: /etc/systemd/journald.conf.d/planit.conf
        mode: '0644'
        content: |
          # PLANIT — borne le journal systemd (VM petit disque). Géré par Ansible.
          [Journal]
          SystemMaxUse=200M
          SystemKeepFree=500M
      notify: Restart journald

  handlers:
    - name: Restart sshd
      ansible.builtin.systemd:
        name: ssh
        state: restarted

    - name: Restart journald
      ansible.builtin.systemd:
        name: systemd-journald
        state: restarted
