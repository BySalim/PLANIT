# PLANIT — stack prod-like (V04 LOT 1.4, ADR-0013 §3).
# Démarrer :
#   docker compose --env-file infra/prod/env/.env.prod -f infra/docker-compose.prod.yml up -d --build
# Une seule chaîne d'images sert la VM self-host ET Railway (mêmes Dockerfiles).
name: planit-prod

# Ancres réutilisables — rotation des logs (V4-D11) appliquée à tous les services.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: '10m'
    max-file: '5'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER requis (.env.prod)}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD requis (.env.prod)}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB requis (.env.prod)}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m
    logging: *default-logging

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 20 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256m
    logging: *default-logging

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER requis (.env.prod)}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD requis (.env.prod)}
    command: server /data --console-address ':9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m
    logging: *default-logging

  # One-shot : applique les migrations (migrate deploy) puis se termine.
  # Image = stage `build` (contient le CLI Prisma). AUCUN seed (V4-D11 / LOT 1.8).
  migrate:
    build:
      context: ..
      dockerfile: apps/backend/Dockerfile
      target: build
    # Image GHCR (publiée par build-images.yml) → la VM pull-based l'applique
    # sans builder sur place. En local, `--build` régénère depuis le stage build.
    image: ghcr.io/bysalim/planit-migrate:${IMAGE_TAG:-local}
    command: ['pnpm', '--filter', '@planit/backend', 'exec', 'prisma', 'migrate', 'deploy']
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL requis (.env.prod)}
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'
    logging: *default-logging

  backend:
    build:
      context: ..
      dockerfile: apps/backend/Dockerfile
      target: runtime
    image: ghcr.io/bysalim/planit-api:${IMAGE_TAG:-local}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL requis (.env.prod)}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET requis (.env.prod)}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET requis (.env.prod)}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-900}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-604800}
      FRONTEND_URL: ${FRONTEND_URL:-https://localhost}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3001/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'
    logging: *default-logging

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      target: runtime
      args:
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-}
    image: ghcr.io/bysalim/planit-web:${IMAGE_TAG:-local}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'
    logging: *default-logging

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_started
      backend:
        condition: service_started
    ports:
      - '80:80'
      - '443:443'
    environment:
      PLANIT_DOMAIN: ${PLANIT_DOMAIN:-localhost}
      CADDY_ACME_EMAIL: ${CADDY_ACME_EMAIL:-admin@planit.local}
    volumes:
      - ./caddy/Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    logging: *default-logging

  # Cloudflare Tunnel (beta publique, ADR-0015) — OPT-IN via le profil `tunnel` :
  #   docker compose --env-file ... --profile tunnel up -d cloudflared
  # Expose la stack (Caddy) sur Internet SANS ouvrir de port entrant : cloudflared
  # n'ouvre que des connexions SORTANTES vers Cloudflare. Le routage public
  # (hostname → https://caddy:443, No-TLS-Verify, Host=PLANIT_DOMAIN) et le rideau
  # Cloudflare Access se configurent côté dashboard CF. Cf. docs/runbooks/beta-tunnel.md.
  cloudflared:
    image: cloudflare/cloudflared:latest
    profiles: ['tunnel']
    restart: unless-stopped
    command: ['tunnel', '--no-autoupdate', 'run']
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:?CLOUDFLARE_TUNNEL_TOKEN requis (profil tunnel)}
    depends_on:
      caddy:
        condition: service_started
    logging: *default-logging

volumes:
  postgres_data:
  redis_data:
  minio_data:
  caddy_data:
  caddy_config:
