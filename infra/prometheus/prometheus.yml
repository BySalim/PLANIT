# Prometheus — scrape des métriques RED du backend PLANIT (ADR-0009 Phase 2).
# Le backend expose /api/metrics (prom-client). Scrape interne au réseau compose.
global:
  scrape_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: planit-backend
    metrics_path: /api/metrics
    static_configs:
      - targets: ['backend:3001']

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
