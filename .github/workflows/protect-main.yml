name: Protect Main

# Stratégie de branches : feat/* → develop → staging → main, + hotfix/* → main.
# `main` (prod) ne reçoit donc que des PR depuis `staging` (promotion testée sur
# la VM) ou une branche `hotfix/*` (correctif urgent prod).
on:
  pull_request:
    branches:
      - main

jobs:
  check-source:
    # ⚠️ Contexte de status check requis par la branch protection de `main`.
    # Renommé depuis `require-develop` le 2026-06-09 (pivot staging) → mettre à
    # jour la liste des required checks de `main` en conséquence.
    name: require-source-main
    runs-on: ubuntu-latest
    steps:
      - name: Ensure PR comes from staging or a hotfix branch
        # head_ref = donnée non fiable (github context) → passée par env, jamais
        # interpolée directement dans le shell (anti script-injection, Semgrep).
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          case "$HEAD_REF" in
            staging|hotfix/*)
              echo "✅ PR source '$HEAD_REF' autorisée vers main."
              ;;
            release-please--branches--main--*)
              # PR de release automatisée (googleapis/release-please-action) :
              # agrège les Conventional Commits, bump version + CHANGELOG, et au
              # merge crée le tag vX.Y.Z. Sa branche ne suit pas le flux humain
              # staging/hotfix mais cible main par design (cf. release-please.yml).
              # Glob étroit : seules les branches release-please ciblant main passent.
              echo "✅ PR de release automatisée (release-please) autorisée vers main."
              ;;
            *)
              echo "❌ Les PR vers main doivent venir de 'staging' ou 'hotfix/*', pas de '$HEAD_REF'."
              echo "Stratégie : feat/* → develop → staging → main (+ hotfix/* → main)"
              exit 1
              ;;
          esac
