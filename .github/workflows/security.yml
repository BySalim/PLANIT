name: Security

# Sécurité CI calibrée — V04 LOT 4 (ADR-0014 §6, V4-D6).
# Baseline NON intrusive : secrets, SCA (deps), SAST, scan image/IaC.
# L'intrusif (pentest, DAST profond, OWASP ASVS, fuzzing) = vague ∞.
#
# Actions épinglées au **SHA complet** (V4-D6 : l'action Trivy a été compromise
# début 2026 → tags mobiles interdits). Le commentaire `# vX` permet à Dependabot
# de proposer les bumps.
#
# Mode "informationnel d'abord" (comme Lighthouse) : SCA/SAST/image-scan ne
# bloquent pas encore la PR ; ils poussent leurs SARIF dans l'onglet Security.
# Le passage en **bloquant** (branch protection) = LOT 5.9. Gitleaks, lui, reste
# bloquant (aucun secret ne doit fuiter ; le hook pre-commit le double en local).

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

permissions:
  contents: read

jobs:
  # 4.1 — Détection de secrets sur tout l'historique (fetch-depth: 0).
  secrets:
    name: Secrets (Gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 4.2 — SCA : audit des dépendances de prod + Trivy filesystem (SARIF).
  sca:
    name: SCA (deps + Trivy fs)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      # Informationnel au LOT 4 (continue-on-error) ; rendu bloquant au LOT 5.9.
      - name: pnpm audit (prod, high+)
        continue-on-error: true
        run: pnpm audit --prod --audit-level high
      - name: Trivy filesystem (vulns + misconfig)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
      - name: Upload Trivy fs SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  # 4.2 — OSV-Scanner (workflow réutilisable officiel Google). fail-on-vuln:false
  # → informationnel ; il pousse lui-même le SARIF dans l'onglet Security.
  osv:
    name: SCA (OSV-Scanner)
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
    with:
      fail-on-vuln: false

  # 4.3 — SAST Semgrep (config auto + règles projet). Informationnel (calibration).
  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      # pipx est préinstallé sur les runners ubuntu-latest ; on garde l'upload
      # SARIF sur l'hôte (Node dispo) plutôt que dans un conteneur semgrep.
      - name: Install Semgrep
        run: pipx install semgrep
      - name: Run Semgrep
        run: semgrep scan --config auto --config .semgrep.yml --sarif --output semgrep.sarif
      - name: Upload Semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  # 4.4 — Scan IaC (Dockerfiles/compose) + images LOT 1 (buildées en CI ; push
  # GHCR = LOT 5). Informationnel ; uniquement sur PR (build coûteux).
  image-scan:
    name: Image & IaC scan (Trivy)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    continue-on-error: true
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Trivy config (IaC — Dockerfiles, compose)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-config.sarif
          severity: HIGH,CRITICAL
      - name: Upload Trivy config SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-config.sarif
          category: trivy-config

      - name: Build backend image
        run: docker build -f apps/backend/Dockerfile -t planit-api:scan .
      - name: Build web image
        run: docker build -f apps/web/Dockerfile -t planit-web:scan .

      - name: Trivy image (backend)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: planit-api:scan
          format: sarif
          output: trivy-api.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
      - name: Upload Trivy backend image SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-api.sarif
          category: trivy-image-api

      - name: Trivy image (web)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: planit-web:scan
          format: sarif
          output: trivy-web.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
      - name: Upload Trivy web image SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-web.sarif
          category: trivy-image-web
