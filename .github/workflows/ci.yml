name: CI

on:
  push:
    branches: ['feat/**', 'fix/**', 'chore/**', 'refactor/**']
  pull_request:
    branches: [develop, main]

jobs:
  quality:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: planit
          POSTGRES_PASSWORD: planit
          POSTGRES_DB: planit_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U planit -d planit_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://planit:planit@localhost:5432/planit_test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # LOT 0 V02 — Vague 02 introduces non-trivial migration data; we run
      # `prisma migrate deploy` against the CI Postgres so a broken migration
      # fails the PR before any test runs.
      - name: Prisma migrate deploy (CI shadow)
        working-directory: apps/backend
        run: |
          pnpm prisma migrate deploy
          pnpm prisma generate

      # @planit/contracts and @planit/utils export ./dist/*.js (the packages
      # are consumed by Node/CommonJS at runtime via NestJS — Node v24 ESM
      # refuses directory imports in source TS, so a built CJS dist/ is
      # required). Vite/Vitest in apps/web also resolves these exports —
      # without a prior build, the web test suite fails with "Failed to
      # resolve entry". Build before lint/typecheck/test so every downstream
      # step sees hydrated dist/ directories.
      - name: Build internal packages (contracts + utils)
        run: |
          pnpm --filter @planit/contracts build
          pnpm --filter @planit/utils build

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          DATABASE_URL: postgresql://planit:planit@localhost:5432/planit_ci

  # Lighthouse mobile audit (/etudiant + /enseignant).
  #
  # Politique :
  # - **Tourne sur toutes les PRs** ciblant develop/main (et seulement
  #   les PRs : pas les push sur feat/*). Chaque dev voit ainsi l'impact
  #   perf/a11y/best-practices/SEO de ses changements via les artefacts
  #   uploadés (rapports HTML accessibles depuis l'onglet Actions du run
  #   et via les liens `storage.googleapis.com` postés dans les logs).
  # - **Le job bloque le merge uniquement si la PR porte le label
  #   `lighthouse-strict`**. Sans ce label, le step Lighthouse est en
  #   `continue-on-error` : les assertions qui échouent annotent le run
  #   en warning mais le job reste `success` (donc CI verte).
  #
  # Ce double mode (signal partout, gate opt-in) évite que des dettes
  # pré-existantes hors scope d'une PR ne bloquent inutilement, tout en
  # gardant la possibilité d'imposer un seuil strict quand on le veut
  # explicitement (release notable, sprint perf, etc.).
  #
  # Voir `docs/runbooks/ci-lighthouse.md` pour les détails d'usage.
  lighthouse:
    name: Lighthouse mobile (Étudiant + Enseignant)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web (production)
        working-directory: apps/web
        run: pnpm build

      - name: Start web (background)
        working-directory: apps/web
        run: pnpm start &
        env:
          PORT: '3000'

      - name: Wait for server
        run: npx --yes wait-on http://localhost:3000 --timeout 60000

      - name: Run Lighthouse CI (mobile)
        # Gating opt-in : sans label `lighthouse-strict`, les échecs
        # d'assertions sont informationnels (annotation warning, mais
        # le job reste success). Avec le label, le job devient bloquant.
        continue-on-error: ${{ !contains(github.event.pull_request.labels.*.name, 'lighthouse-strict') }}
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            http://localhost:3000/etudiant
            http://localhost:3000/enseignant
          configPath: ./.github/lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
