name: CI

on:
  push:
    branches: ['feat/**', 'fix/**', 'chore/**', 'refactor/**', 'hotfix/**']
  pull_request:
    branches: [develop, staging, main]

jobs:
  quality:
    # ⚠️ Ce `name:` est un *contexte de status check requis* par la branch
    # protection de `develop` et `main` (contexts: "Lint · Typecheck · Test").
    # NE PAS le renommer sans mettre à jour la branch protection des 2 branches
    # (sinon GitHub attend un check qui n'arrive jamais → PR bloquée sur
    # "Expected — Waiting for status to be reported"). Le coverage gate est un
    # step interne (cf. "Test + coverage gate"), pas une partie du nom.
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: planit
          POSTGRES_PASSWORD: planit
          POSTGRES_DB: planit_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U planit -d planit_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://planit:planit@localhost:5432/planit_test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # LOT 0 V02 — Vague 02 introduces non-trivial migration data; we run
      # `prisma migrate deploy` against the CI Postgres so a broken migration
      # fails the PR before any test runs.
      - name: Prisma migrate deploy (CI shadow)
        working-directory: apps/backend
        run: |
          pnpm prisma migrate deploy
          pnpm prisma generate

      # @planit/contracts and @planit/utils export ./dist/*.js (the packages
      # are consumed by Node/CommonJS at runtime via NestJS — Node v24 ESM
      # refuses directory imports in source TS, so a built CJS dist/ is
      # required). Vite/Vitest in apps/web also resolves these exports —
      # without a prior build, the web test suite fails with "Failed to
      # resolve entry". Build before lint/typecheck/test so every downstream
      # step sees hydrated dist/ directories.
      - name: Build internal packages (contracts + utils)
        run: |
          pnpm --filter @planit/contracts build
          pnpm --filter @planit/utils build

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      # LOT 2 V04 — `test:coverage` runs the full Vitest suite with the v8
      # coverage gate (per-package thresholds, ADR-0014 §2). Folded into the
      # already-required `quality` check so coverage gates without running the
      # (slow) backend integration suite twice. The dedicated `e2e` job below
      # covers the Playwright layer.
      - name: Test + coverage gate
        run: pnpm test:coverage

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage
          path: |
            apps/*/coverage
            packages/*/coverage
          retention-days: 7
          if-no-files-found: ignore

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          DATABASE_URL: postgresql://planit:planit@localhost:5432/planit_ci

  # Lighthouse mobile audit (page publique `/login`).
  #
  # Depuis l'auth V02, toute route applicative est gated par le middleware edge
  # (307 → /login en anonyme) : `/login` est la seule page auditable sans
  # session. Audit des vraies pages connectées = run authentifié (TD-LH-AUTH-AUDIT).
  #
  # Politique :
  # - **Tourne sur toutes les PRs** ciblant develop/main (et seulement
  #   les PRs : pas les push sur feat/*). Chaque dev voit ainsi l'impact
  #   perf/a11y/best-practices/SEO de ses changements via les artefacts
  #   uploadés (rapports HTML accessibles depuis l'onglet Actions du run
  #   et via les liens `storage.googleapis.com` postés dans les logs).
  # - **Gating à deux niveaux** :
  #   1. PR ciblant `main` (release develop → main) → **toujours bloquant**.
  #      C'est le moment où on garantit la qualité officielle, pas
  #      d'option laxiste.
  #   2. PR ciblant `develop` → bloquant **uniquement** si la PR porte
  #      le label `lighthouse-strict`. Sinon informationnel (assertions
  #      annotées en warning, job vert).
  #
  # Ce mode (signal partout, gate auto-release + opt-in feature) évite
  # que des dettes pré-existantes hors scope d'une PR feature ne bloquent
  # inutilement, tout en garantissant qu'aucune release vers main ne
  # passe sans audit strict.
  #
  # Voir `docs/runbooks/ci-lighthouse.md` pour les détails d'usage.
  lighthouse:
    name: Lighthouse mobile (Étudiant + Enseignant)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    # Postgres + backend en background pour que le fetch initial `/auth/me`
    # depuis le AuthProvider (root layout) retourne un 401 propre au lieu
    # d'un `net::ERR_CONNECTION_REFUSED` qui pollue la console et fait
    # tomber l'audit `errors-in-console`. Le backend reçoit les requêtes
    # mais répond 401 puisque l'audit Lighthouse n'a pas de cookie — c'est
    # le comportement attendu.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: planit
          POSTGRES_PASSWORD: planit
          POSTGRES_DB: planit_lh
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U planit -d planit_lh"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://planit:planit@localhost:5432/planit_lh
      # Secrets dummy : aucun token n'est signé/vérifié pendant l'audit
      # (Lighthouse n'a pas de cookie). Suffisants pour faire booter le
      # backend.
      JWT_ACCESS_SECRET: lh_dummy_access_secret_at_least_32_chars_long
      JWT_REFRESH_SECRET: lh_dummy_refresh_secret_at_least_32_chars_long
      JWT_ACCESS_TTL: '900'
      JWT_REFRESH_TTL: '604800'
      FRONTEND_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Le backend est consommé par Next.js client-side dès le mount du
      # AuthProvider (root layout). Sans lui, `fetch('/api/auth/me')` lance
      # un `ERR_CONNECTION_REFUSED` que Chrome log en console → fail LH.
      - name: Prisma migrate deploy (LH backend)
        working-directory: apps/backend
        run: |
          pnpm prisma migrate deploy
          pnpm prisma generate

      # Les packages CJS doivent exister avant `nest build`.
      - name: Build internal packages (contracts + utils)
        run: |
          pnpm --filter @planit/contracts build
          pnpm --filter @planit/utils build

      - name: Build backend
        working-directory: apps/backend
        run: pnpm build

      - name: Start backend (background)
        working-directory: apps/backend
        run: nohup pnpm start > backend.log 2>&1 &

      - name: Wait for backend
        run: npx --yes wait-on http://localhost:3001/api/health --timeout 60000

      - name: Build web (production)
        working-directory: apps/web
        run: pnpm build

      - name: Start web (background)
        working-directory: apps/web
        run: pnpm start &
        env:
          PORT: '3000'

      - name: Wait for server
        run: npx --yes wait-on http://localhost:3000 --timeout 60000

      - name: Run Lighthouse CI (mobile)
        # Gating à deux niveaux (cf. commentaire au-dessus du job) :
        # - target = main → toujours bloquant (release officielle)
        # - target = develop → bloquant uniquement si label `lighthouse-strict`
        # `continue-on-error` est `true` (non bloquant) seulement si on est
        # vers develop ET pas de label strict.
        continue-on-error: ${{ github.base_ref != 'main' && !contains(github.event.pull_request.labels.*.name, 'lighthouse-strict') }}
        uses: treosh/lighthouse-ci-action@72f881228236981b625ed765b928efb1786a1f55 # v11
        with:
          # On audite `/login`, **seule page publique** depuis l'arrivée de
          # l'auth V02 : le middleware edge redirige toute route applicative
          # (`/etudiant`, `/enseignant`, `/rp`…) en 307 vers `/login` tant
          # qu'il n'y a pas de cookie de session. Auditer ces routes en
          # anonyme faisait donc échouer l'audit `redirects` (Lighthouse suit
          # la 307) — un faux négatif, le redirect d'auth étant légitime.
          # `/login` est le shell commun aux 3 acteurs ; perf/a11y y sont
          # représentatifs. Auditer les vraies pages connectées demande un run
          # authentifié (cookie) → tech-debt TD-LH-AUTH-AUDIT, cf. runbook.
          urls: |
            http://localhost:3000/login
          configPath: ./.github/lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

  # E2E Playwright — parcours d'authentification des 4 rôles (ADR-0014 §4).
  # Démarre la stack prod-like en CI : Postgres + backend (build + start) +
  # web (next build + start), DB **seedée** (comptes des 4 rôles), puis lance
  # Playwright headless. Bloquant (pas de continue-on-error) — DoD LOT 2.
  e2e:
    name: E2E Playwright (4 rôles)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: planit
          POSTGRES_PASSWORD: planit
          POSTGRES_DB: planit_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U planit -d planit_e2e"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://planit:planit@localhost:5432/planit_e2e
      # Secrets factices (≥32 chars) : signés/vérifiés par le même process
      # backend pendant l'e2e — suffisants pour l'auth bout-en-bout.
      JWT_ACCESS_SECRET: e2e_dummy_access_secret_at_least_32_chars_long
      JWT_REFRESH_SECRET: e2e_dummy_refresh_secret_at_least_32_chars_long
      JWT_ACCESS_TTL: '900'
      JWT_REFRESH_TTL: '604800'
      FRONTEND_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma migrate deploy + generate
        working-directory: apps/backend
        run: |
          pnpm prisma migrate deploy
          pnpm prisma generate

      # La prod ne seed pas (V4-D11) ; l'e2e a besoin des comptes des 4 rôles
      # pour exercer le login (tous au mot de passe seed `Test1234!`).
      - name: Seed database (e2e accounts)
        working-directory: apps/backend
        run: pnpm db:seed

      - name: Build internal packages (contracts + utils)
        run: |
          pnpm --filter @planit/contracts build
          pnpm --filter @planit/utils build

      - name: Build backend
        working-directory: apps/backend
        run: pnpm build

      - name: Build web (production)
        working-directory: apps/web
        run: pnpm build

      - name: Install Playwright chromium
        run: pnpm exec playwright install --with-deps chromium

      # NODE_ENV=development → cookies d'auth **non-Secure** : sur http://localhost
      # un cookie `Secure` serait refusé par le navigateur (cf. cookies.ts), le
      # login échouerait silencieusement. La sécurité réelle (Secure=true) reste
      # active en prod réelle (HTTPS via Caddy).
      - name: Start backend (background)
        working-directory: apps/backend
        run: nohup pnpm start > backend.log 2>&1 &
        env:
          NODE_ENV: development

      - name: Wait for backend
        run: npx --yes wait-on http://localhost:3001/api/health --timeout 60000

      - name: Start web (background)
        working-directory: apps/web
        run: nohup pnpm start > web.log 2>&1 &
        env:
          PORT: '3000'

      - name: Wait for web
        run: npx --yes wait-on http://localhost:3000/login --timeout 60000

      - name: Run Playwright e2e
        run: pnpm exec playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload backend log on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: e2e-backend-log
          path: apps/backend/backend.log
          retention-days: 7
          if-no-files-found: ignore

  # Perf smoke k6 — endpoints chauds (LOT 3, ADR-0014 §5).
  #
  # Mesure login + planning + suivi-modules + inscription(lookup) + classes sous
  # charge légère (profil `smoke`), avec seuils p95 < 800 ms, erreur < 1 %, 0 5xx.
  #
  # **Informationnel** en V04 (`continue-on-error` sur le run k6) : la baseline
  # se stabilise sans bloquer les PRs. Devient **bloquant** au LOT 5.9 (branch
  # protection) — il suffira de retirer le `continue-on-error`.
  #
  # Le backend tourne en `NODE_ENV=test` : relâche le throttle login
  # (5/min/IP → 10000, sinon le smoke prendrait des 429) et rend les cookies
  # non-Secure (acceptés sur http://localhost). La sécurité réelle (throttle
  # 5/min, cookies Secure) reste active en prod (HTTPS via Caddy).
  #
  # Cible = backend direct (:3001) pour isoler la latence API sans le proxy Next.
  # Voir `docs/runbooks/perf-k6.md`.
  perf-smoke:
    name: Perf smoke (k6)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: planit
          POSTGRES_PASSWORD: planit
          POSTGRES_DB: planit_perf
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U planit -d planit_perf"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://planit:planit@localhost:5432/planit_perf
      JWT_ACCESS_SECRET: perf_dummy_access_secret_at_least_32_chars_long
      JWT_REFRESH_SECRET: perf_dummy_refresh_secret_at_least_32_chars_long
      JWT_ACCESS_TTL: '900'
      JWT_REFRESH_TTL: '604800'
      FRONTEND_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma migrate deploy + generate
        working-directory: apps/backend
        run: |
          pnpm prisma migrate deploy
          pnpm prisma generate

      # Le smoke a besoin des comptes des 4 rôles + des données (classes,
      # séances de la semaine courante, modules) pour mesurer des endpoints
      # non vides.
      - name: Seed database (perf data)
        working-directory: apps/backend
        run: pnpm db:seed

      - name: Build internal packages (contracts + utils)
        run: |
          pnpm --filter @planit/contracts build
          pnpm --filter @planit/utils build

      - name: Build backend
        working-directory: apps/backend
        run: pnpm build

      # NODE_ENV=test → throttle login relâché + cookies non-Secure (cf. en-tête).
      - name: Start backend (background)
        working-directory: apps/backend
        run: nohup pnpm start > backend.log 2>&1 &
        env:
          NODE_ENV: test

      - name: Wait for backend
        run: npx --yes wait-on http://localhost:3001/api/health --timeout 60000

      # Binaire k6 pinné (download direct — pas d'action tierce à SHA-pinner).
      - name: Install k6
        run: |
          curl -fsSL https://github.com/grafana/k6/releases/download/v2.0.0/k6-v2.0.0-linux-amd64.tar.gz | tar xz
          sudo mv k6-v2.0.0-linux-amd64/k6 /usr/local/bin/k6
          k6 version

      - name: Run k6 perf smoke (informational)
        # Informationnel en V04 (DoD LOT 3) ; bloquant au LOT 5.9.
        continue-on-error: true
        env:
          BASE_URL: http://localhost:3001
          PROFILE: smoke
        run: |
          set -o pipefail
          mkdir -p tests/perf/results
          k6 run tests/perf/scenarios/smoke.js | tee tests/perf/results/smoke-summary.txt

      - name: Upload k6 summary
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: perf-smoke-summary
          path: tests/perf/results/smoke-summary.txt
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload backend log on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: perf-backend-log
          path: apps/backend/backend.log
          retention-days: 7
          if-no-files-found: ignore
