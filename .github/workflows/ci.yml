name: CI

on:
  push:
    branches: ['feat/**', 'fix/**', 'chore/**', 'refactor/**']
  pull_request:
    branches: [develop, main]

jobs:
  quality:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: planit
          POSTGRES_PASSWORD: planit
          POSTGRES_DB: planit_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U planit -d planit_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://planit:planit@localhost:5432/planit_test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # LOT 0 V02 — Vague 02 introduces non-trivial migration data; we run
      # `prisma migrate deploy` against the CI Postgres so a broken migration
      # fails the PR before any test runs.
      - name: Prisma migrate deploy (CI shadow)
        working-directory: apps/backend
        run: |
          pnpm prisma migrate deploy
          pnpm prisma generate

      # @planit/contracts exports point to ./dist/*.js (the package is
      # consumed by Node/CommonJS at runtime via NestJS). Vite/Vitest in
      # apps/web resolves these exports too — without a prior build, the
      # web test suite fails with "Failed to resolve entry". Build here
      # before lint/typecheck/test so every downstream step sees a hydrated
      # dist/ directory.
      - name: Build @planit/contracts
        run: pnpm --filter @planit/contracts build

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          DATABASE_URL: postgresql://planit:planit@localhost:5432/planit_ci

  # LOT 0.7 / LOT 7 V02 — Lighthouse mobile audit on /etudiant and
  # /enseignant. Conditional: only runs on PRs labeled `lighthouse` or
  # coming from `feat/libasse` (LOT 7 owner). Avoids false failures on
  # backend / contracts PRs during LOTs 0–6.
  lighthouse:
    name: Lighthouse mobile (Étudiant + Enseignant)
    runs-on: ubuntu-latest
    needs: build
    if: |
      contains(github.event.pull_request.labels.*.name, 'lighthouse') ||
      github.head_ref == 'feat/libasse'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web (production)
        working-directory: apps/web
        run: pnpm build

      - name: Start web (background)
        working-directory: apps/web
        run: pnpm start &
        env:
          PORT: '3000'

      - name: Wait for server
        run: npx --yes wait-on http://localhost:3000 --timeout 60000

      - name: Run Lighthouse CI (mobile)
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            http://localhost:3000/etudiant
            http://localhost:3000/enseignant
          configPath: ./.github/lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
