name: Protect Staging

# Stratégie de branches : feat/* → develop → staging → main, + hotfix/* → main.
# `staging` (serveur de test = VM self-host) ne reçoit que des PR depuis `develop`
# (intégration validée) ou une branche `hotfix/*` (correctif à tester avant main).
on:
  pull_request:
    branches:
      - staging

jobs:
  check-source:
    # Contexte de status check requis par la branch protection de `staging`.
    name: require-source-staging
    runs-on: ubuntu-latest
    steps:
      - name: Ensure PR comes from develop or a hotfix branch
        run: |
          HEAD="${{ github.head_ref }}"

          case "$HEAD" in
            develop|hotfix/*)
              echo "✅ PR source '$HEAD' autorisée vers staging."
              ;;
            *)
              echo "❌ Les PR vers staging doivent venir de 'develop' ou 'hotfix/*', pas de '$HEAD'."
              echo "Stratégie : feat/* → develop → staging → main (+ hotfix/* → main)"
              exit 1
              ;;
          esac
