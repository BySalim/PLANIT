name: Build & push images (GHCR)

# V04 LOT 5 — socle du CD pull-based (ADR-0013 §2/§6).
# Construit et publie les images prod sur GitHub Container Registry. La VM
# self-host (agent `cd-pull.sh`) tire ensuite ces images (connexion sortante
# seule). Images PRIVÉES → la VM s'authentifie au pull (docker login ghcr.io,
# PAT read:packages ; cf. docs/runbooks/vm-self-host.md §3bis).
#
# Tags produits (metadata-action) :
#   - :<branch>      (`:develop`, `:main`) — tag mouvant suivi par le CD
#   - :sha-<court>   — tag immuable (rollback déterministe)
#   - :latest        — uniquement sur `main`
#   - :<version>     — sur tag git `vX.Y.Z`

on:
  push:
    branches: [develop, main]
    tags: ['v*']
  workflow_dispatch:

# GITHUB_TOKEN suffit à pousser sur GHCR pour ce repo (pas de PAT).
permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build ${{ matrix.app }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: api
            dockerfile: apps/backend/Dockerfile
            target: runtime
            build_args: ''
          # Le web inline les NEXT_PUBLIC_* AU BUILD (bundle client). La VM tire
          # l'image déjà construite → ces valeurs DOIVENT être injectées ici, pas
          # au runtime sur la VM. Variables repo publiques (pas des secrets) :
          # NEXT_PUBLIC_SENTRY_DSN (Sentry navigateur) + NEXT_PUBLIC_WS_URL (realtime).
          - app: web
            dockerfile: apps/web/Dockerfile
            target: runtime
            build_args: |
              NEXT_PUBLIC_SENTRY_DSN=${{ vars.NEXT_PUBLIC_SENTRY_DSN }}
              NEXT_PUBLIC_WS_URL=${{ vars.NEXT_PUBLIC_WS_URL }}
          # Image one-shot des migrations (stage `build` = CLI Prisma) — tirée par
          # la VM pour `prisma migrate deploy` sans builder sur place (LOT 5.8).
          - app: migrate
            dockerfile: apps/backend/Dockerfile
            target: build
            build_args: ''
    steps:
      - uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/bysalim/planit-${{ matrix.app }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          # Build args web (NEXT_PUBLIC_* inlinés) ; vide pour api/migrate.
          build-args: ${{ matrix.build_args }}
          # VM = VirtualBox x86_64 → une seule plateforme (build rapide).
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}
