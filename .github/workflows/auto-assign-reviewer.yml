name: Auto-assign reviewer

on:
  pull_request:
    types: [opened, reopened]
    branches: [develop, main]

jobs:
  assign:
    name: Assign @BySalim as reviewer
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const author = pr.user.login;

            // GitHub interdit d'assigner l'auteur comme reviewer de sa propre PR
            if (author === 'BySalim') {
              console.log(`PR ouverte par @BySalim — assignation ignorée (auto-review interdit)`);
              return;
            }

            await github.rest.pulls.requestReviewers({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              reviewers: ['BySalim'],
            });

            console.log(`@BySalim assigné comme reviewer sur PR #${pr.number}`);
