[extend]
useDefault = true

[allowlist]
description = "PLANIT allowlist"
# NB : ces motifs sont des **regex RE2** (pas des globs). `*.md` était invalide
# (`no argument for repetition operator`) et faisait échouer gitleaks 8.24+ en CI.
paths = [
  # Tout fichier *.example est un template (placeholders, pas de vrai secret) :
  # .env.example, infra/prod/env/.env.prod.example, etc. (V04 LOT 4.8).
  '''\.example$''',
  '''^docs/''',
  '''\.md$''',
  # Tests backend : mots de passe de fixtures synthétiques (≥12 car. pour les
  # schémas Zod), jamais de vrais secrets. La règle générique gitleaks les flague
  # dès qu'ils dépassent le seuil d'entropie (V05 LOT 1). Exemption scoped au
  # répertoire de tests uniquement.
  '''^apps/backend/test/''',
]
