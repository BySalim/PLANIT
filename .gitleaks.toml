[extend]
useDefault = true

[allowlist]
description = "PLANIT allowlist"
# NB : ces motifs sont des **regex RE2** (pas des globs). `*.md` était invalide
# (`no argument for repetition operator`) et faisait échouer gitleaks 8.24+ en CI.
paths = [
  # Tout fichier *.example est un template (placeholders, pas de vrai secret) :
  # .env.example, infra/prod/env/.env.prod.example, etc. (V04 LOT 4.8).
  '''\.example$''',
  '''^docs/''',
  '''\.md$''',
]
